<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Planner</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #ffffff; color: #1a1a1a; }
  input, textarea, select { font-family: inherit; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 6px; padding: 4px 8px; color: #1a1a1a; outline: none; }
  input:focus, textarea:focus { border-color: #7F77DD; }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    input, textarea, select { background: #2a2a2a; border-color: #3a3a3a; color: #f0f0f0; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ─── CONFIG — REPLACE THESE TWO VALUES ───────────────────────────────────────
const SUPABASE_URL = "https://wojfppyjesmfrwfrndun.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OVoVg9VpYUxbUo3fRCBTjg_CtYNzvbj";
// ─────────────────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect, useRef, useCallback } = React;

const TYPES = ["task","break","meal","prep","PhD","meeting","class","tutoring","personal"];
const TYPE_COLORS = {
  task:"#888780",break:"#185FA5",meal:"#0F6E56",prep:"#BA7517",
  PhD:"#7F77DD",meeting:"#D85A30",class:"#1D9E75",tutoring:"#D4537E",personal:"#639922"
};
const PRIORITY_COLORS = { low:"#1D9E75", medium:"#BA7517", high:"#A32D2D" };
const REPEAT_OPTIONS = ["none","daily","weekdays","weekly","custom"];
const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const HOUR_H = 56;
const DAY_START_H = 7;
const HOURS = Array.from({length:17},(_,i)=>i+DAY_START_H);

function todayKey(){ return new Date().toISOString().slice(0,10); }
function getWeekDays(ref){
  const d=new Date(ref+"T12:00:00"),day=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{ const dd=new Date(mon); dd.setDate(mon.getDate()+i); return dd.toISOString().slice(0,10); });
}
function fmtDay(dk){ const d=new Date(dk+"T12:00:00"); return {short:d.toLocaleDateString("en-GB",{weekday:"short"}),num:d.getDate(),month:d.toLocaleDateString("en-GB",{month:"short"}),dow:(d.getDay()+6)%7}; }
function fmtDur(m){ const h=Math.floor(m/60),mn=m%60; return h===0?`${mn}m`:mn===0?`${h}h`:`${h}h${mn}m`; }
function minsToTime(m){ const h=Math.floor(m/60)%24,mn=m%60; return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; }
function timeToMins(t){ if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; }
function minsToY(m){ return ((m-DAY_START_H*60)/60)*HOUR_H; }

function doesRecurOn(rec,dk){
  const dow=fmtDay(dk).dow;
  if(rec.repeat==="daily") return true;
  if(rec.repeat==="weekdays") return dow<5;
  if(rec.repeat==="weekly") return fmtDay(rec.startDate||dk).dow===dow;
  if(rec.repeat==="custom") return (rec.repeatDays||[]).includes(dow);
  return false;
}
function schedule(tasks,dayStartStr){
  const dayStart=timeToMins(dayStartStr||"08:00"); let cur=dayStart;
  return tasks.map(t=>{
    const req=timeToMins(t.startTime||minsToTime(cur));
    const s=Math.max(req,cur); cur=s+t.duration;
    return {...t,_s:s,_e:s+t.duration,_late:s>req+1};
  });
}
function getWarnings(tasks,energy){
  const w=[];
  const total=tasks.filter(t=>!t.done&&t.type!=="break"&&t.type!=="meal").reduce((s,t)=>s+t.duration,0);
  if(total>480) w.push({c:"#A32D2D",msg:"Very packed day — consider rescheduling."});
  else if(total>360) w.push({c:"#BA7517",msg:"Full day — keep some buffer."});
  if(!tasks.some(t=>t.type==="meal")) w.push({c:"#0F6E56",msg:"No meal break scheduled!"});
  if(!tasks.some(t=>t.type==="break")&&total>120) w.push({c:"#185FA5",msg:"No breaks — add one every ~90 mins."});
  if((energy||3)<=1) w.push({c:"#7F77DD",msg:"Low energy — tackle lighter tasks first."});
  return w;
}
function parseTodos(note){
  return (note||"").split("\n").map(l=>l.trim()).filter(Boolean).map((text,i)=>({id:i,text,done:false}));
}
const mkTask=()=>({id:Date.now()+Math.random(),name:"",duration:60,priority:"medium",type:"task",done:false,note:"",todos:[],startTime:"09:00",repeat:"none",repeatDays:[],repeatId:null});

// ─── SUPABASE HELPERS ─────────────────────────────────────────────────────────
async function dbLoad(userId){
  const [{data:d1},{data:d2}] = await Promise.all([
    sb.from("planner_days").select("*").eq("user_id",userId),
    sb.from("planner_recurring").select("*").eq("user_id",userId)
  ]);
  const days={};
  (d1||[]).forEach(r=>{ days[r.day_key]=r.data; });
  return { days, recurring:(d2||[]).map(r=>r.data) };
}
async function dbSaveDay(userId,dayKey,data){
  await sb.from("planner_days").upsert({user_id:userId,day_key:dayKey,data,updated_at:new Date().toISOString()},{onConflict:"user_id,day_key"});
}
async function dbSaveRecurring(userId,recurring){
  await sb.from("planner_recurring").delete().eq("user_id",userId);
  if(recurring.length>0){
    await sb.from("planner_recurring").insert(recurring.map(r=>({user_id:userId,data:r})));
  }
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen(){
  const [loading,setLoading]=useState(false);
  async function signIn(){
    setLoading(true);
    await sb.auth.signInWithOAuth({ provider:"github", options:{ redirectTo: window.location.href } });
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24}}>
      <div style={{width:48,height:48,borderRadius:12,background:"#EEEDFE",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:24}}>🗓</span>
      </div>
      <h1 style={{fontSize:22,fontWeight:500}}>Smart Planner</h1>
      <p style={{fontSize:14,color:"#888",textAlign:"center",maxWidth:280}}>Sign in to sync your schedule across all your devices.</p>
      <button onClick={signIn} disabled={loading}
        style={{padding:"10px 24px",fontSize:15,fontWeight:500,background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
        {loading ? "Redirecting…" : "Sign in with GitHub"}
      </button>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Planner({user}){
  const [weekOf,setWeekOf]=useState(todayKey());
  const [weekDays,setWeekDays]=useState(getWeekDays(todayKey()));
  const [allData,setAllData]=useState({});
  const [recurring,setRecurring]=useState([]);
  const [selected,setSelected]=useState(todayKey());
  const [view,setView]=useState("week");
  const [showAdd,setShowAdd]=useState(false);
  const [draft,setDraft]=useState(mkTask());
  const [expandedId,setExpandedId]=useState(null);
  const [todoInput,setTodoInput]=useState({});
  const [showRecurring,setShowRecurring]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const saveTimer=useRef({});
  const timelineRef=useRef(null);
  const today=todayKey();

  // Load from Supabase on mount, fallback to localStorage
  useEffect(()=>{
    async function load(){
      try {
        const {days,recurring:rec}=await dbLoad(user.id);
        // Merge with localStorage fallback
        const local=JSON.parse(localStorage.getItem("smart-planner-v4")||"{}");
        const local_rec=JSON.parse(localStorage.getItem("smart-planner-v4-recurring")||"[]");
        setAllData({...local,...days});
        setRecurring(rec.length>0?rec:local_rec);
      } catch(e){
        const local=JSON.parse(localStorage.getItem("smart-planner-v4")||"{}");
        const local_rec=JSON.parse(localStorage.getItem("smart-planner-v4-recurring")||"[]");
        setAllData(local); setRecurring(local_rec);
      }
      setLoaded(true);
    }
    load();
  },[user.id]);

  // Save a specific day — debounced
  function persistDay(dk,data){
    localStorage.setItem("smart-planner-v4",JSON.stringify({...allData,[dk]:data}));
    clearTimeout(saveTimer.current[dk]);
    saveTimer.current[dk]=setTimeout(async()=>{
      setSyncing(true);
      await dbSaveDay(user.id,dk,data).catch(()=>{});
      setSyncing(false);
    },1200);
  }
  // Save recurring — debounced
  const recurringTimer=useRef(null);
  function persistRecurring(rec){
    localStorage.setItem("smart-planner-v4-recurring",JSON.stringify(rec));
    clearTimeout(recurringTimer.current);
    recurringTimer.current=setTimeout(async()=>{
      setSyncing(true);
      await dbSaveRecurring(user.id,rec).catch(()=>{});
      setSyncing(false);
    },1200);
  }

  function dayData(dk){ return allData[dk]||{tasks:[],energy:3,dayStart:"08:00"}; }
  function setDayData(dk,d){
    setAllData(p=>({...p,[dk]:d}));
    persistDay(dk,d);
  }
  function updateTasks(dk,tasks){ setDayData(dk,{...dayData(dk),tasks}); }
  function setRec(rec){ setRecurring(rec); persistRecurring(rec); }

  function navWeek(dir){
    const d=new Date(weekOf+"T12:00:00"); d.setDate(d.getDate()+dir*7);
    const nk=d.toISOString().slice(0,10); setWeekOf(nk); setWeekDays(getWeekDays(nk));
  }

  function getEffectiveTasks(dk){
    const dd=dayData(dk); const stored=dd.tasks||[];
    const storedRecurIds=new Set(stored.map(t=>t.repeatId).filter(Boolean));
    const recTasks=recurring.filter(r=>doesRecurOn(r,dk)&&!storedRecurIds.has(r.id))
      .map(r=>({...r,repeatId:r.id,id:r.id+"-"+dk,done:false,todos:parseTodos(r.note),_recurring:true}));
    return [...recTasks,...stored];
  }

  function addTask(){
    if(!draft.name.trim()) return;
    const todos=parseTodos(draft.note);
    if(draft.repeat!=="none"){
      const rec=[...recurring,{...draft,id:Date.now(),todos,startDate:selected}];
      setRec(rec);
    } else {
      const dd=dayData(selected);
      updateTasks(selected,[...dd.tasks,{...draft,id:Date.now(),todos}]);
    }
    setDraft(mkTask()); setShowAdd(false);
  }
  function removeTask(dk,id,isRec,repeatId){
    if(isRec){
      const dd=dayData(dk);
      updateTasks(dk,[...dd.tasks,{id:Date.now(),repeatId,_cancelled:true,name:"",duration:0,type:"task",done:false,note:"",todos:[],startTime:"00:00"}]);
    } else { updateTasks(dk,dayData(dk).tasks.filter(t=>t.id!==id)); }
  }
  function removeRecurring(id){ setRec(recurring.filter(r=>r.id!==id)); }

  function toggleDone(dk,task){
    if(task._recurring){
      const dd=dayData(dk); const ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,done:!t.done}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),done:true}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,done:!t.done}:t)); }
  }
  function toggleTodo(dk,task,todoId){
    const upd=todos=>todos.map(td=>td.id===todoId?{...td,done:!td.done}:td);
    if(task._recurring){
      const dd=dayData(dk); const ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,todos:upd(t.todos||[])}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),todos:upd(task.todos||[])}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,todos:upd(t.todos||[])}:t)); }
  }
  function addTodoItem(dk,task,text){
    if(!text.trim()) return;
    const nt={id:Date.now(),text,done:false};
    if(task._recurring){
      const dd=dayData(dk); const ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,todos:[...(t.todos||[]),nt]}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),todos:[...(task.todos||[]),nt]}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,todos:[...(t.todos||[]),nt]}:t)); }
  }
  function updateNote(dk,task,note){
    const todos=parseTodos(note);
    if(task._recurring){
      const dd=dayData(dk); const ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,note,todos}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),note,todos}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,note,todos}:t)); }
  }
  function addQuick(dk,type,name,duration){
    const eff=getEffectiveTasks(dk).filter(t=>!t._cancelled);
    const sched=schedule(eff,dayData(dk).dayStart||"08:00");
    const lastEnd=sched.length>0?sched[sched.length-1]._e:timeToMins(dayData(dk).dayStart||"08:00");
    const dd=dayData(dk);
    updateTasks(dk,[...dd.tasks,{id:Date.now(),name,duration,priority:"low",type,done:false,note:"",todos:[],startTime:minsToTime(lastEnd),repeat:"none",repeatId:null}]);
  }

  function onBlockMouseDown(e,task){
    e.preventDefault(); const startY=e.clientY,origMins=task._s;
    function onMove(ev){
      const dy=ev.clientY-startY;
      const ns=Math.round((origMins+dy/HOUR_H*60)/15)*15;
      const cl=Math.max(DAY_START_H*60,Math.min(ns,(DAY_START_H+16)*60-task.duration));
      const st=minsToTime(cl);
      if(task._recurring){
        const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
        if(ex) updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,startTime:st}:t));
        else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),startTime:st}]);
      } else { updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,startTime:st}:t)); }
    }
    function onUp(){ window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); }
    window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
  }
  function onResizeMouseDown(e,task){
    e.preventDefault(); e.stopPropagation(); const startY=e.clientY,origDur=task.duration;
    function onMove(ev){
      const nd=Math.max(15,Math.round((origDur+(ev.clientY-startY)/HOUR_H*60)/15)*15);
      if(task._recurring){
        const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
        if(ex) updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,duration:nd}:t));
        else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),duration:nd}]);
      } else { updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,duration:nd}:t)); }
    }
    function onUp(){ window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); }
    window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
  }

  const selData=dayData(selected);
  const selEff=getEffectiveTasks(selected).filter(t=>!t._cancelled);
  const selSched=schedule(selEff,selData.dayStart||"08:00");
  const selWarnings=getWarnings(selEff,selData.energy);
  const monthLabel=(()=>{
    const d0=new Date(weekDays[0]+"T12:00:00"),d6=new Date(weekDays[6]+"T12:00:00");
    const m0=d0.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
    const m6=d6.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
    return m0===m6?m0:`${d0.toLocaleDateString("en-GB",{month:"short"})} – ${m6}`;
  })();
  const repeatLabel=r=>{
    if(r.repeat==="daily") return "Every day";
    if(r.repeat==="weekdays") return "Weekdays";
    if(r.repeat==="weekly") return `Every ${DOW[fmtDay(r.startDate||todayKey()).dow]}`;
    if(r.repeat==="custom") return (r.repeatDays||[]).map(d=>DOW[d]).join(", ");
    return "";
  };

  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",fontSize:14,color:"#888"}}>Loading your planner…</div>;

  const borderC="1px solid #e0e0e0";
  const gridC="1px solid #e8e8e8";
  const halfC="1px dashed #ececec";

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#1a1a1a",maxWidth:"100%",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:borderC}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>navWeek(-1)} style={{background:"none",border:borderC,borderRadius:6,padding:"3px 9px",fontSize:14,color:"#666"}}>‹</button>
          <span style={{fontSize:13,fontWeight:500}}>{monthLabel}</span>
          <button onClick={()=>navWeek(1)} style={{background:"none",border:borderC,borderRadius:6,padding:"3px 9px",fontSize:14,color:"#666"}}>›</button>
          <button onClick={()=>{setWeekOf(todayKey());setWeekDays(getWeekDays(todayKey()));setSelected(todayKey());}} style={{background:"none",border:borderC,borderRadius:6,padding:"3px 8px",fontSize:11,color:"#999"}}>Today</button>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {syncing&&<span style={{fontSize:11,color:"#7F77DD"}}>Syncing…</span>}
          <span style={{fontSize:11,color:"#999",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email||user.user_metadata?.user_name}</span>
          <button onClick={()=>sb.auth.signOut()} style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:borderC,background:"none",color:"#999"}}>Sign out</button>
          <button onClick={()=>setShowRecurring(p=>!p)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:showRecurring?"1.5px solid #D85A30":borderC,background:showRecurring?"#FAECE7":"none",color:showRecurring?"#D85A30":"#666"}}>↻ Recurring</button>
          {["week","day"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:view===v?"1.5px solid #7F77DD":borderC,background:view===v?"#EEEDFE":"none",color:view===v?"#3C3489":"#666"}}>{v}</button>
          ))}
        </div>
      </div>

      {/* Recurring panel */}
      {showRecurring&&(
        <div style={{padding:"10px 14px",borderBottom:borderC,background:"#fafafa"}}>
          <p style={{fontSize:12,fontWeight:500,marginBottom:8}}>Recurring tasks</p>
          {recurring.length===0&&<p style={{fontSize:12,color:"#999"}}>No recurring tasks yet.</p>}
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {recurring.map(r=>{
              const tc=TYPE_COLORS[r.type]||"#888";
              return (
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:6,border:`1px solid ${tc}55`,background:tc+"12"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:tc}}/>
                  <div>
                    <p style={{fontSize:12,fontWeight:500}}>{r.name}</p>
                    <p style={{fontSize:10,color:"#999"}}>{r.startTime} · {fmtDur(r.duration)} · {repeatLabel(r)}</p>
                  </div>
                  <button onClick={()=>removeRecurring(r.id)} style={{fontSize:13,color:"#bbb",background:"none",border:"none",marginLeft:4}}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view==="week" ? (
        <div style={{overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"40px repeat(7,1fr)",borderBottom:borderC,minWidth:520}}>
            <div/>
            {weekDays.map(dk=>{
              const {short,num}=fmtDay(dk),isToday=dk===today,isSel=dk===selected;
              return (
                <div key={dk} onClick={()=>{setSelected(dk);setView("day");}} style={{padding:"6px 2px",textAlign:"center",cursor:"pointer",borderLeft:borderC,background:isSel?"#EEEDFE18":"none"}}>
                  <p style={{fontSize:10,color:"#999",textTransform:"uppercase",letterSpacing:"0.05em"}}>{short}</p>
                  <div style={{width:26,height:26,borderRadius:"50%",background:isToday?"#7F77DD":"none",display:"flex",alignItems:"center",justifyContent:"center",margin:"2px auto 0"}}>
                    <p style={{fontSize:14,fontWeight:500,color:isToday?"#fff":"#1a1a1a"}}>{num}</p>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{position:"relative",minWidth:520,maxHeight:500,overflowY:"auto"}}>
            {HOURS.map(h=>(
              <div key={h} style={{display:"grid",gridTemplateColumns:"40px repeat(7,1fr)",height:HOUR_H}}>
                <div style={{fontSize:10,color:"#bbb",padding:"2px 4px 0",textAlign:"right",borderTop:gridC,boxSizing:"border-box"}}>{String(h).padStart(2,"0")}:00</div>
                {weekDays.map(dk=>(
                  <div key={dk} onClick={()=>{setSelected(dk);setView("day");}} style={{borderTop:gridC,borderLeft:gridC,boxSizing:"border-box",position:"relative",background:dk===selected?"#EEEDFE08":"none",cursor:"pointer"}}>
                    <div style={{position:"absolute",top:"50%",left:0,right:0,borderTop:halfC}}/>
                  </div>
                ))}
              </div>
            ))}
            {weekDays.map((dk,di)=>{
              const dd=dayData(dk);
              const eff=getEffectiveTasks(dk).filter(t=>!t._cancelled);
              const sched=schedule(eff,dd.dayStart||"08:00");
              const colW=`calc((100% - 40px)/7)`;
              return sched.map(t=>{
                const top=minsToY(t._s),height=Math.max((t.duration/60)*HOUR_H,14);
                const tc=TYPE_COLORS[t.type]||"#888";
                if(top<0||top>HOURS.length*HOUR_H) return null;
                return (
                  <div key={t.id} onClick={()=>{setSelected(dk);setView("day");}} style={{position:"absolute",top,left:`calc(40px + ${di}*${colW} + 2px)`,width:`calc(${colW} - 4px)`,height:height-2,background:tc+(t._recurring?"33":"22"),borderLeft:`2px solid ${tc}`,borderRadius:3,overflow:"hidden",boxSizing:"border-box",padding:"1px 3px",cursor:"pointer"}}>
                    <p style={{fontSize:9,fontWeight:500,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3,opacity:t.done?0.4:1}}>{t.name}</p>
                  </div>
                );
              });
            })}
          </div>
          <div style={{padding:"8px 14px",borderTop:borderC,display:"flex",gap:10,flexWrap:"wrap"}}>
            {TYPES.map(ty=>(
              <span key={ty} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#666"}}>
                <span style={{width:9,height:9,borderRadius:2,background:TYPE_COLORS[ty],display:"inline-block"}}/>{ty}
              </span>
            ))}
            <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#666"}}>
              <span style={{width:9,height:9,borderRadius:2,border:"1px dashed #888",display:"inline-block"}}/>recurring
            </span>
          </div>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"220px 1fr",minHeight:520}}>
          {/* LEFT */}
          <div style={{borderRight:borderC,display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",padding:"8px 8px 6px",borderBottom:borderC,gap:2}}>
              {weekDays.map(dk=>{
                const {short,num}=fmtDay(dk),isToday=dk===today,isSel=dk===selected;
                return (
                  <div key={dk} onClick={()=>setSelected(dk)} style={{flex:1,textAlign:"center",cursor:"pointer"}}>
                    <p style={{fontSize:9,color:"#bbb",textTransform:"uppercase"}}>{short}</p>
                    <div style={{width:20,height:20,borderRadius:"50%",background:isToday?"#7F77DD":isSel?"#EEEDFE":"none",border:isSel&&!isToday?"1.5px solid #7F77DD":"none",display:"flex",alignItems:"center",justifyContent:"center",margin:"1px auto"}}>
                      <p style={{fontSize:11,fontWeight:500,color:isToday?"#fff":isSel?"#3C3489":"#555"}}>{num}</p>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{padding:"8px 10px",borderBottom:borderC,display:"flex",gap:10,alignItems:"center"}}>
              <div>
                <p style={{fontSize:10,color:"#999",marginBottom:3}}>Start</p>
                <input type="time" value={selData.dayStart||"08:00"} onChange={e=>setDayData(selected,{...selData,dayStart:e.target.value})} style={{fontSize:12,padding:"2px 4px"}}/>
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:10,color:"#999",marginBottom:3}}>Energy</p>
                <div style={{display:"flex",gap:3}}>
                  {[1,2,3,4,5].map(n=>(
                    <div key={n} onClick={()=>setDayData(selected,{...selData,energy:n})} style={{width:16,height:16,borderRadius:"50%",background:(selData.energy||3)>=n?"#7F77DD":"#f0f0f0",cursor:"pointer",border:"1px solid #e0e0e0"}}/>
                  ))}
                </div>
              </div>
            </div>
            {selWarnings.length>0&&(
              <div style={{padding:"6px 10px",borderBottom:borderC}}>
                {selWarnings.map((w,i)=>(
                  <div key={i} style={{fontSize:11,padding:"4px 6px",borderRadius:6,border:`1px solid ${w.c}44`,color:"#555",marginBottom:4,background:w.c+"0a"}}>{w.msg}</div>
                ))}
              </div>
            )}
            <div style={{flex:1,overflowY:"auto",padding:"6px 8px"}}>
              {selSched.length===0&&<p style={{fontSize:12,color:"#bbb",textAlign:"center",marginTop:20}}>No tasks — add one below</p>}
              {selSched.map(task=>{
                const isExp=expandedId===task.id,tc=TYPE_COLORS[task.type]||"#888";
                const doneTodos=(task.todos||[]).filter(td=>td.done).length,totalTodos=(task.todos||[]).length;
                return (
                  <div key={task.id} style={{borderRadius:6,border:task._recurring?`1px dashed ${tc}55`:`1px solid #e8e8e8`,marginBottom:5,background:"#fff",opacity:task.done?0.55:1,overflow:"hidden"}}>
                    <div style={{display:"flex",gap:7,padding:"7px 8px",alignItems:"flex-start"}}>
                      <div onClick={()=>toggleDone(selected,task)} style={{width:9,height:9,borderRadius:"50%",background:tc,flexShrink:0,marginTop:4,cursor:"pointer"}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                          <span onClick={()=>setExpandedId(isExp?null:task.id)} style={{fontSize:12,fontWeight:500,cursor:"pointer",textDecoration:task.done?"line-through":"none"}}>{task.name}</span>
                          <span style={{fontSize:10,padding:"1px 5px",borderRadius:99,background:tc+"22",color:tc}}>{task.type}</span>
                          {task._recurring&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:99,background:"#FAECE7",color:"#D85A30"}}>↻</span>}
                          {task._late&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:99,background:"#FAEEDA",color:"#633806"}}>moved</span>}
                        </div>
                        <p style={{fontSize:10,color:"#bbb",marginTop:1}}>{minsToTime(task._s)}–{minsToTime(task._e)} · {fmtDur(task.duration)}</p>
                        {totalTodos>0&&<p style={{fontSize:10,color:"#bbb",marginTop:1}}>{doneTodos}/{totalTodos} todos</p>}
                      </div>
                      <button onClick={()=>removeTask(selected,task.id,task._recurring,task.repeatId)} style={{fontSize:13,color:"#ccc",background:"none",border:"none",padding:"0 2px",flexShrink:0}}>×</button>
                    </div>
                    {isExp&&(
                      <div style={{padding:"0 8px 8px",borderTop:"1px solid #f0f0f0"}}>
                        <p style={{fontSize:10,color:"#bbb",margin:"6px 0 3px"}}>Notes (each line → todo)</p>
                        <textarea rows={3} placeholder="Add notes…" value={task.note||""} onChange={e=>updateNote(selected,task,e.target.value)} style={{width:"100%",fontSize:12,resize:"vertical",padding:"4px 6px"}}/>
                        {(task.todos||[]).length>0&&(
                          <div style={{marginTop:6}}>
                            {(task.todos||[]).map(td=>(
                              <div key={td.id} onClick={()=>toggleTodo(selected,task,td.id)} style={{display:"flex",gap:6,alignItems:"flex-start",padding:"3px 0",cursor:"pointer"}}>
                                <div style={{width:13,height:13,borderRadius:3,border:`1.5px solid ${tc}`,background:td.done?tc:"none",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {td.done&&<span style={{fontSize:9,color:"#fff",lineHeight:1}}>✓</span>}
                                </div>
                                <span style={{fontSize:12,textDecoration:td.done?"line-through":"none",lineHeight:1.4,color:td.done?"#bbb":"#1a1a1a"}}>{td.text}</span>
                              </div>
                            ))}
                          </div>
                        )}
                        <div style={{display:"flex",gap:4,marginTop:5}}>
                          <input placeholder="Add todo…" value={todoInput[task.id]||""} onChange={e=>setTodoInput(p=>({...p,[task.id]:e.target.value}))}
                            onKeyDown={e=>{if(e.key==="Enter"){addTodoItem(selected,task,todoInput[task.id]||"");setTodoInput(p=>({...p,[task.id]:""}));}}}
                            style={{flex:1,fontSize:12,padding:"3px 6px"}}/>
                          <button onClick={()=>{addTodoItem(selected,task,todoInput[task.id]||"");setTodoInput(p=>({...p,[task.id]:""}));}} style={{fontSize:12,padding:"3px 8px",background:"#EEEDFE",color:"#3C3489",border:"none",borderRadius:6}}>+</button>
                        </div>
                        <div style={{display:"flex",gap:8,marginTop:6}}>
                          <div style={{flex:1}}>
                            <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Start</label>
                            <input type="time" value={task.startTime||""} onChange={e=>{
                              const v=e.target.value;
                              if(task._recurring){const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);if(ex)updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,startTime:v}:t));else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),startTime:v}]);}
                              else updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,startTime:v}:t));
                            }} style={{fontSize:12,width:"100%"}}/>
                          </div>
                          <div style={{flex:1}}>
                            <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Mins</label>
                            <input type="number" min={15} step={15} value={task.duration} onChange={e=>{
                              const dur=Number(e.target.value);
                              if(task._recurring){const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);if(ex)updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,duration:dur}:t));else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),duration:dur}]);}
                              else updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,duration:dur}:t));
                            }} style={{fontSize:12,width:"100%"}}/>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{padding:"8px",borderTop:borderC}}>
              {showAdd?(
                <div style={{background:"#fafafa",borderRadius:8,padding:"10px",border:borderC}}>
                  <input placeholder="Task name" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} style={{width:"100%",fontSize:13,marginBottom:7}}/>
                  <div style={{display:"flex",gap:6,marginBottom:7}}>
                    <div style={{flex:1}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Start</label><input type="time" value={draft.startTime||""} onChange={e=>setDraft(d=>({...d,startTime:e.target.value}))} style={{fontSize:12,width:"100%"}}/></div>
                    <div style={{flex:1}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Mins</label><input type="number" min={15} step={15} value={draft.duration} onChange={e=>setDraft(d=>({...d,duration:Number(e.target.value)}))} style={{fontSize:12,width:"100%"}}/></div>
                  </div>
                  <div style={{marginBottom:6}}>
                    <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Type</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                      {TYPES.map(ty=>(<button key={ty} onClick={()=>setDraft(d=>({...d,type:ty}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:draft.type===ty?`1.5px solid ${TYPE_COLORS[ty]}`:"1px solid #e0e0e0",background:draft.type===ty?TYPE_COLORS[ty]+"22":"none",color:draft.type===ty?TYPE_COLORS[ty]:"#999"}}>{ty}</button>))}
                    </div>
                  </div>
                  <div style={{marginBottom:6}}>
                    <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Repeat</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                      {REPEAT_OPTIONS.map(r=>(<button key={r} onClick={()=>setDraft(d=>({...d,repeat:r}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:draft.repeat===r?"1.5px solid #D85A30":"1px solid #e0e0e0",background:draft.repeat===r?"#FAECE7":"none",color:draft.repeat===r?"#D85A30":"#999"}}>{r}</button>))}
                    </div>
                    {draft.repeat==="custom"&&(
                      <div style={{display:"flex",gap:3,marginTop:5}}>
                        {DOW.map((day,i)=>(<button key={i} onClick={()=>setDraft(d=>({...d,repeatDays:d.repeatDays.includes(i)?d.repeatDays.filter(x=>x!==i):[...d.repeatDays,i]}))} style={{fontSize:10,padding:"2px 6px",borderRadius:99,border:(draft.repeatDays||[]).includes(i)?"1.5px solid #D85A30":"1px solid #e0e0e0",background:(draft.repeatDays||[]).includes(i)?"#FAECE7":"none",color:(draft.repeatDays||[]).includes(i)?"#D85A30":"#999"}}>{day}</button>))}
                      </div>
                    )}
                  </div>
                  <div style={{marginBottom:7}}>
                    <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Priority</label>
                    <div style={{display:"flex",gap:3}}>
                      {["low","medium","high"].map(p=>(<button key={p} onClick={()=>setDraft(d=>({...d,priority:p}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:draft.priority===p?`1.5px solid ${PRIORITY_COLORS[p]}`:"1px solid #e0e0e0",background:"none",color:draft.priority===p?PRIORITY_COLORS[p]:"#999"}}>{p}</button>))}
                    </div>
                  </div>
                  <textarea placeholder="Notes (each line → todo)" value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} rows={2} style={{width:"100%",fontSize:12,resize:"none",padding:"4px 6px",marginBottom:7}}/>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={addTask} style={{flex:1,padding:"6px",fontSize:12,background:"#EEEDFE",color:"#3C3489",border:"none",borderRadius:6,fontWeight:500}}>Add</button>
                    <button onClick={()=>setShowAdd(false)} style={{padding:"6px 10px",fontSize:12,background:"none",border:borderC,borderRadius:6,color:"#888"}}>Cancel</button>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>setShowAdd(true)} style={{flex:1,padding:"6px",fontSize:12,fontWeight:500,background:"#EEEDFE",color:"#3C3489",border:"none",borderRadius:6}}>+ Task</button>
                  <button onClick={()=>addQuick(selected,"break","Break",15)} style={{padding:"6px 8px",fontSize:12,background:"none",border:borderC,borderRadius:6,color:"#888"}}>Break</button>
                  <button onClick={()=>addQuick(selected,"meal","Meal",30)} style={{padding:"6px 8px",fontSize:12,background:"none",border:borderC,borderRadius:6,color:"#888"}}>Meal</button>
                </div>
              )}
            </div>
          </div>

          {/* RIGHT: TIMELINE */}
          <div style={{position:"relative",overflowY:"auto"}} ref={timelineRef}>
            {HOURS.map(h=>(
              <div key={h} style={{display:"flex",height:HOUR_H,borderTop:gridC,boxSizing:"border-box",position:"relative"}}>
                <div style={{width:44,flexShrink:0,fontSize:10,color:"#ccc",padding:"3px 6px 0",textAlign:"right"}}>{String(h).padStart(2,"0")}:00</div>
                <div style={{flex:1,borderLeft:gridC,position:"relative"}}>
                  <div style={{position:"absolute",top:"50%",left:0,right:0,borderTop:halfC}}/>
                </div>
              </div>
            ))}
            {selSched.map(task=>{
              const top=minsToY(task._s),height=Math.max((task.duration/60)*HOUR_H,20);
              const tc=TYPE_COLORS[task.type]||"#888",isExp=expandedId===task.id;
              if(top<0) return null;
              return (
                <div key={task.id} onMouseDown={e=>onBlockMouseDown(e,task)} onClick={()=>setExpandedId(isExp?null:task.id)}
                  style={{position:"absolute",top,left:46,right:6,height:height-2,background:tc+(task.done?"15":task._recurring?"33":"28"),borderLeft:`3px solid ${tc}`,borderRadius:6,boxSizing:"border-box",padding:"3px 8px 4px",cursor:"grab",userSelect:"none",overflow:"hidden",border:`${task._recurring?"1px dashed":"1px solid"} ${tc}55`,borderLeftWidth:3}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <p style={{fontSize:11,fontWeight:500,color:"#1a1a1a",opacity:task.done?0.4:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3}}>{task.name}</p>
                    <div style={{display:"flex",gap:3,flexShrink:0,marginLeft:4}}>
                      {task._recurring&&<span style={{fontSize:9,padding:"0 4px",borderRadius:99,background:"#FAECE7",color:"#D85A30"}}>↻</span>}
                      <span style={{fontSize:9,padding:"0 4px",borderRadius:99,background:tc+"33",color:tc}}>{task.type}</span>
                    </div>
                  </div>
                  {height>28&&<p style={{fontSize:10,color:"#888",marginTop:1}}>{minsToTime(task._s)}–{minsToTime(task._e)}</p>}
                  {height>44&&task.todos&&task.todos.length>0&&<p style={{fontSize:10,color:"#bbb",marginTop:1}}>{task.todos.filter(t=>t.done).length}/{task.todos.length} todos</p>}
                  <div onMouseDown={e=>onResizeMouseDown(e,task)} onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,height:8,cursor:"ns-resize",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{width:24,height:2,borderRadius:1,background:tc+"88"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function Root(){
  const [session,setSession]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:14,color:"#999"}}>Loading…</div>;
  if(!session) return <LoginScreen/>;
  return <Planner user={session.user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
