// ─── UTILS ────────────────────────────────────────────────────────────────────
function todayKey(){ return new Date().toISOString().slice(0,10); }
function getWeekDays(ref){
  const d=new Date(ref+"T12:00:00"),day=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{ const dd=new Date(mon); dd.setDate(mon.getDate()+i); return dd.toISOString().slice(0,10); });
}
function fmtDay(dk){ const d=new Date(dk+"T12:00:00"); return {short:d.toLocaleDateString("en-GB",{weekday:"short"}),num:d.getDate(),month:d.toLocaleDateString("en-GB",{month:"short"}),dow:(d.getDay()+6)%7}; }
function fmtDur(m){ const h=Math.floor(m/60),mn=m%60; return h===0?`${mn}m`:mn===0?`${h}h`:`${h}h${mn}m`; }
function minsToTime(m){ const h=Math.floor(m/60)%24,mn=m%60; return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; }
function timeToMins(t){ if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; }
function minsToY(m){ return ((m-DAY_START_H*60)/60)*HOUR_H; }
function doesRecurOn(rec,dk){
  if(rec.repeatStart && dk < rec.repeatStart) return false;
  if(rec.repeatEnd && dk > rec.repeatEnd) return false;
  const dow=fmtDay(dk).dow;
  if(rec.repeat==="daily") return true;
  if(rec.repeat==="weekdays") return dow<5;
  if(rec.repeat==="weekly") return fmtDay(rec.repeatStart||rec.startDate||dk).dow===dow;
  if(rec.repeat==="custom") return (rec.repeatDays||[]).includes(dow);
  return false;
}
function schedule(tasks,dayStartStr){
  const dayStart=timeToMins(dayStartStr||"08:00"); let cur=dayStart;
  return tasks.map(t=>{
    const req=timeToMins(t.startTime||minsToTime(cur));
    const s=t.fixed?req:Math.max(req,cur);
    cur=Math.max(cur, s+t.duration);
    return {...t,_s:s,_e:s+t.duration,_late:!t.fixed&&s>req+1};
  });
}
function getWarnings(tasks,energy){
  const w=[];
  const total=tasks.filter(t=>!t.done&&!(t.types||[t.type]).includes("break")&&!(t.types||[t.type]).includes("meal")).reduce((s,t)=>s+t.duration,0);
  if(total>480) w.push({c:"#A32D2D",msg:"Very packed day — consider rescheduling."});
  else if(total>360) w.push({c:"#BA7517",msg:"Full day — keep some buffer."});
  if(!tasks.some(t=>(t.types||[t.type]).includes("meal"))) w.push({c:"#0F6E56",msg:"No meal break scheduled!"});
  if(!tasks.some(t=>(t.types||[t.type]).includes("break"))&&total>120) w.push({c:"#185FA5",msg:"No breaks — add one every ~90 mins."});
  if((energy||3)<=1) w.push({c:"#7F77DD",msg:"Low energy — tackle lighter tasks first."});
  return w;
}
function parseTodos(note){
  return (note||"").split("\n").map(l=>l.trim()).filter(Boolean).map((text,i)=>({id:i,text,done:false,tag:null}));
}
const mkTask=()=>({id:Date.now()+Math.random(),name:"",duration:60,priority:"medium",types:["task"],done:false,note:"",todos:[],startTime:"09:00",repeat:"none",repeatDays:[],repeatId:null,repeatStart:"",repeatEnd:"",reminder:"none",fixed:false});

// ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
function reminderMins(r){ return {none:null,"5 mins":5,"10 mins":10,"15 mins":15,"30 mins":30,"1 hour":60}[r]||null; }

async function requestNotifPermission(){
  if(!("Notification" in window)) return false;
  if(Notification.permission==="granted") return true;
  const p=await Notification.requestPermission();
  return p==="granted";
}

function scheduleNotification(task, dayKey){
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  const mins=reminderMins(task.reminder);
  if(mins===null) return;
  const [y,m,d]=dayKey.split("-").map(Number);
  const [th,tm]=task.startTime.split(":").map(Number);
  const fireAt=new Date(y,m-1,d,th,tm-mins,0,0).getTime();
  const delay=fireAt-Date.now();
  if(delay<=0) return;
  setTimeout(()=>{
    new Notification(`Starting soon: ${task.name}`,{
      body:`Starts at ${task.startTime} · ${fmtDur(task.duration)}`,
      icon:"/smart-planner/icon.png",
      tag:`task-${task.id}-${dayKey}`,
    });
  },delay);
}

function scheduleAllReminders(allData, recurring, weekDays){
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  weekDays.forEach(dk=>{
    const stored=(allData[dk]?.tasks||[]);
    const storedRecurIds=new Set(stored.map(t=>t.repeatId).filter(Boolean));
    const recTasks=recurring.filter(r=>doesRecurOn(r,dk)&&!storedRecurIds.has(r.id))
      .map(r=>({...r,repeatId:r.id,id:r.id+"-"+dk}));
    [...recTasks,...stored].filter(t=>t.reminder&&t.reminder!=="none"&&!t.done&&!t._cancelled)
      .forEach(t=>scheduleNotification(t,dk));
  });
}
const GCAL_SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
const GCAL_TOKEN_KEY = "gcal_token";

function getGcalToken(){ try{ return JSON.parse(localStorage.getItem(GCAL_TOKEN_KEY)); }catch{ return null; } }
function setGcalToken(t){ localStorage.setItem(GCAL_TOKEN_KEY,JSON.stringify(t)); }
function clearGcalToken(){ localStorage.removeItem(GCAL_TOKEN_KEY); }

function isTokenValid(t){ return t && t.access_token && t.expires_at && Date.now() < t.expires_at - 60000; }

function startGcalAuth(){
  const params=new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: SITE_URL,
    response_type: "token",
    scope: GCAL_SCOPES,
    include_granted_scopes: "true",
    state: "gcal_auth",
  });
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

function parseGcalCallback(){
  const hash=window.location.hash.slice(1);
  if(!hash) return false;
  const p=new URLSearchParams(hash);
  if(p.get("state")==="gcal_auth" && p.get("access_token")){
    const token={ access_token:p.get("access_token"), expires_at:Date.now()+Number(p.get("expires_in")||3600)*1000 };
    setGcalToken(token);
    window.history.replaceState(null,"",window.location.pathname);
    return true;
  }
  return false;
}

async function fetchGcalEvents(token, weekStart, weekEnd){
  const url=new URL("https://www.googleapis.com/calendar/v3/calendars/primary/events");
  url.searchParams.set("timeMin", weekStart+"T00:00:00Z");
  url.searchParams.set("timeMax", weekEnd+"T23:59:59Z");
  url.searchParams.set("singleEvents","true");
  url.searchParams.set("orderBy","startTime");
  url.searchParams.set("maxResults","100");
  const res=await fetch(url, {headers:{Authorization:`Bearer ${token.access_token}`}});
  if(res.status===401){ clearGcalToken(); return []; }
  const data=await res.json();
  return (data.items||[]).map(ev=>{
    const start=ev.start?.dateTime||ev.start?.date;
    const end=ev.end?.dateTime||ev.end?.date;
    const startMins=start?timeToMins(new Date(start).toTimeString().slice(0,5)):null;
    const endMins=end?timeToMins(new Date(end).toTimeString().slice(0,5)):null;
    const dk=start?new Date(start).toISOString().slice(0,10):null;
    return { id:"gcal-"+ev.id, name:ev.summary||"(no title)", dk, startMins, duration:endMins&&startMins?endMins-startMins:30, _gcal:true, allDay:!ev.start?.dateTime };
  }).filter(ev=>ev.dk&&ev.startMins!==null&&!ev.allDay);
}

  function applyTimetable(startDk){
    // Apply timetable slots as recurring tasks for current week onwards
    const newRec=[...recurring];
    timetableSlots.forEach(({day,slots})=>{
      const dowIdx=DOW.indexOf(day);

          id:Date.now()+Math.random(),

          types:[slot.type||"class"],

          repeatEnd:slot.endDate||"",
          done:false,note:"",todos:[],
          reminder:"none",startDate:startDk,
          fixed:slot.fixed!==false,
        });
      });
    });
    setRec(newRec);
    setShowTimetable(false);
  }

  function addTimetableSlot(dayIdx){
    setTimetableSlots(prev=>prev.map((d,i)=>i===dayIdx?{...d,slots:[...d.slots,{name:"",startTime:"09:00",duration:180,type:"class",endDate:"",fixed:true}]}:d));

    setTimetableSlots(prev=>prev.map((d,i)=>i===dayIdx?{...d,slots:d.slots.filter((_,si)=>si!==slotIdx)}:d));

  function dayData(dk){ return allData[dk]||{tasks:[],energy:3,dayStart:"08:00"}; }

  function updateTasks(dk,tasks){ setDayData(dk,{...dayData(dk),tasks}); }

  function navWeek(dir){

  function getEffectiveTasks(dk){
    const stored=(dayData(dk).tasks||[]).map(t=>({...t,types:t.types||(t.type?[t.type]:["task"])}));
    const cancelledIds=new Set(stored.filter(t=>t._cancelled).map(t=>String(t.repeatId)));
    const storedRecurIds=new Set(stored.filter(t=>!t._cancelled&&t.repeatId).map(t=>String(t.repeatId)));
    const recTasks=recurring
      .filter(r=>doesRecurOn(r,dk)&&!cancelledIds.has(String(r.id))&&!storedRecurIds.has(String(r.id)))

      const dd=dayData(dk),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,done:!t.done}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),done:true}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,done:!t.done}:t)); }
  }
  function toggleTodo(dk,task,todoId){
    const upd=todos=>todos.map(td=>td.id===todoId?{...td,done:!td.done}:td);
    if(task._recurring){
      const dd=dayData(dk),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,todos:upd(t.todos||[])}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),todos:upd(task.todos||[])}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,todos:upd(t.todos||[])}:t)); }
  }
  function setTodoTag(dk,task,todoId,tag){
    const upd=todos=>todos.map(td=>td.id===todoId?{...td,tag:td.tag===tag?null:tag}:td);
    if(task._recurring){
      const dd=dayData(dk),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,todos:upd(t.todos||[])}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),todos:upd(task.todos||[])}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,todos:upd(t.todos||[])}:t)); }
  }
  function addTodoItem(dk,task,text){
    if(!text.trim()) return;
    const nt={id:Date.now(),text,done:false};
    if(task._recurring){
      const dd=dayData(dk),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,todos:[...(t.todos||[]),nt]}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),todos:[...(task.todos||[]),nt]}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,todos:[...(t.todos||[]),nt]}:t)); }
  }
  function updateNote(dk,task,note){
    const todos=parseTodos(note);
    if(task._recurring){
      const dd=dayData(dk),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
      if(ex) updateTasks(dk,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,note,todos}:t));
      else updateTasks(dk,[...dd.tasks,{...task,id:Date.now(),note,todos}]);
    } else { updateTasks(dk,dayData(dk).tasks.map(t=>t.id===task.id?{...t,note,todos}:t)); }
  }
  function addQuick(dk,type,name,duration){
    const eff=getEffectiveTasks(dk).filter(t=>!t._cancelled);
    const sched=schedule(eff,dayData(dk).dayStart||"08:00");
    const lastEnd=sched.length>0?sched[sched.length-1]._e:timeToMins(dayData(dk).dayStart||"08:00");
    updateTasks(dk,[...dayData(dk).tasks,{id:Date.now(),name,duration,priority:"low",types:[type],done:false,note:"",todos:[],startTime:minsToTime(lastEnd),repeat:"none",repeatId:null}]);
  }

  function onBlockMouseDown(e,task){
    e.preventDefault(); const startY=e.clientY,origMins=task._s;
    function onMove(ev){
      const ns=Math.round((origMins+(ev.clientY-startY)/HOUR_H*60)/15)*15;
      const cl=Math.max(DAY_START_H*60,Math.min(ns,(DAY_START_H+16)*60-task.duration));
      const st=minsToTime(cl);
      if(task._recurring){
        const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
        if(ex) updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,startTime:st}:t));
        else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),startTime:st}]);
      } else { updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,startTime:st}:t)); }
    }
    function onUp(){ window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); }
    window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
  }
  function onResizeMouseDown(e,task){
    e.preventDefault(); e.stopPropagation(); const startY=e.clientY,origDur=task.duration;
    function onMove(ev){
      const nd=Math.max(15,Math.round((origDur+(ev.clientY-startY)/HOUR_H*60)/15)*15);
      if(task._recurring){
        const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
        if(ex) updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,duration:nd}:t));
        else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),duration:nd}]);
      } else { updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,duration:nd}:t)); }
    }
    function onUp(){ window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); }
    window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
  }

  const selData=dayData(selected);
  const selEff=getEffectiveTasks(selected).filter(t=>!t._cancelled);
  const selSched=schedule(selEff,selData.dayStart||"08:00");
  const selGcal=gcalEvents.filter(e=>e.dk===selected);
  const selWarnings=getWarnings(selEff,selData.energy);
  const gcalConnected=gcalToken&&isTokenValid(gcalToken);

  const monthLabel=(()=>{
    const d0=new Date(weekDays[0]+"T12:00:00"),d6=new Date(weekDays[6]+"T12:00:00");
    const m0=d0.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
    const m6=d6.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
    return m0===m6?m0:`${d0.toLocaleDateString("en-GB",{month:"short"})} – ${m6}`;
  })();
  const repeatLabel=r=>{
    if(r.repeat==="daily") return "Every day";
    if(r.repeat==="weekdays") return "Weekdays";
    if(r.repeat==="weekly") return `Every ${DOW[fmtDay(r.repeatStart||r.startDate||todayKey()).dow]}`;
    if(r.repeat==="custom") return (r.repeatDays||[]).map(d=>DOW[d]).join(", ");
    return "";
  };
  const repeatDateRange=r=>{
    const parts=[];
    if(r.repeatStart) parts.push(`from ${r.repeatStart}`);
    if(r.repeatEnd) parts.push(`until ${r.repeatEnd}`);
    return parts.join(" ");
  };

  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:14,color:"#999"}}>Loading…</div>;

  const B="1px solid #e0e0e0", G="1px solid #ebebeb", GD="1px dashed #f0f0f0";

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#1a1a1a"}}>

      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:B,flexWrap:"wrap",gap:6}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>navWeek(-1)} style={{background:"none",border:B,borderRadius:6,padding:"3px 9px",fontSize:14,color:"#666"}}>‹</button>
          <span style={{fontSize:13,fontWeight:500}}>{monthLabel}</span>
          <button onClick={()=>navWeek(1)} style={{background:"none",border:B,borderRadius:6,padding:"3px 9px",fontSize:14,color:"#666"}}>›</button>
          <button onClick={()=>{setWeekOf(todayKey());setWeekDays(getWeekDays(todayKey()));setSelected(todayKey());}} style={{background:"none",border:B,borderRadius:6,padding:"3px 8px",fontSize:11,color:"#999"}}>Today</button>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          {syncing&&<span style={{fontSize:11,color:"#7F77DD"}}>Syncing…</span>}
          {/* Google Calendar button */}
          {gcalConnected ? (
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:6,border:"1px solid #1D9E7555",background:"#E1F5EE",fontSize:11,color:"#0F6E56"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#1D9E75",display:"inline-block"}}/>
              Google Calendar
              {gcalLoading&&<span style={{marginLeft:4,opacity:0.6}}>↻</span>}
              <button onClick={()=>{clearGcalToken();setGcalTokenState(null);setGcalEvents([]);}} style={{marginLeft:4,fontSize:11,color:"#0F6E56",background:"none",border:"none",padding:0}}>×</button>
            </div>
          ) : (
            <button onClick={startGcalAuth} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:B,background:"none",color:"#666"}}>+ Google Calendar</button>
          )}
          <button onClick={()=>setShowTodoPanel(p=>!p)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:showTodoPanel?"1.5px solid #7F77DD":B,background:showTodoPanel?"#EEEDFE":"none",color:showTodoPanel?"#3C3489":"#666"}}>To-do list</button>
          {!notifGranted&&<button onClick={async()=>{const g=await requestNotifPermission();setNotifGranted(g);if(g)scheduleAllReminders(allData,recurring,weekDays);}} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:B,background:"none",color:"#BA7517"}}>Enable reminders</button>}
          {notifGranted&&<span style={{fontSize:11,color:"#1D9E75",padding:"3px 6px"}}>Reminders on</span>}
          <button onClick={()=>setShowRecurring(p=>!p)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:showRecurring?"1.5px solid #D85A30":B,background:showRecurring?"#FAECE7":"none",color:showRecurring?"#D85A30":"#666"}}>↻ Recurring</button>
          {["week","day"].map(vw=>(
            <button key={vw} onClick={()=>setView(vw)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:view===vw?"1.5px solid #7F77DD":B,background:view===vw?"#EEEDFE":"none",color:view===vw?"#3C3489":"#666"}}>{vw}</button>
          ))}
          <button onClick={()=>setShowCopyDay(p=>!p)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:showCopyDay?"1.5px solid #185FA5":B,background:showCopyDay?"#E6F1FB":"none",color:showCopyDay?"#185FA5":"#666"}}>Copy day</button>
          <button onClick={()=>setShowTimetable(p=>!p)} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:showTimetable?"1.5px solid #1D9E75":B,background:showTimetable?"#E1F5EE":"none",color:showTimetable?"#0F6E56":"#666"}}>Timetable</button>
          <button onClick={()=>setShowClearDay(true)} style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"1px solid #f0c0c0",background:"none",color:"#A32D2D"}}>Clear day</button>
          <button onClick={()=>setShowClearConfirm(true)} style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"1px solid #f0c0c0",background:"none",color:"#A32D2D"}}>Clear diary</button>
          <button onClick={()=>sb.auth.signOut()} style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:B,background:"none",color:"#bbb"}}>Sign out</button>
        </div>
      </div>

      {/* RECURRING PANEL */}
      {showRecurring&&(
        <div style={{padding:"10px 14px",borderBottom:B,background:"#fafafa"}}>
          <p style={{fontSize:12,fontWeight:500,marginBottom:8}}>Recurring tasks</p>
          {recurring.length===0&&<p style={{fontSize:12,color:"#bbb"}}>No recurring tasks yet. Set a repeat option when adding a task.</p>}
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {recurring.map(r=>{
              const tc=TYPE_COLORS[r.type]||"#888";
              return (
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:6,border:`1px solid ${tc}55`,background:tc+"12"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:tc,flexShrink:0}}/>
                  <div>
                    <p style={{fontSize:12,fontWeight:500}}>{r.name}</p>
                    <p style={{fontSize:10,color:"#999"}}>{r.startTime} · {fmtDur(r.duration)} · {repeatLabel(r)}{repeatDateRange(r)?" · "+repeatDateRange(r):""}</p>
                  </div>
                  <button onClick={()=>removeRecurring(r.id)} style={{fontSize:14,color:"#ccc",background:"none",border:"none",marginLeft:4}}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view==="week" ? (
        <div style={{overflowX:"auto"}}>
          {/* Day headers */}
          <div style={{display:"grid",gridTemplateColumns:"40px repeat(7,1fr)",borderBottom:B,minWidth:520}}>
            <div/>
            {weekDays.map(dk=>{
              const {short,num}=fmtDay(dk),isToday=dk===today,isSel=dk===selected;
              const dayGcal=gcalEvents.filter(e=>e.dk===dk);
              return (
                <div key={dk} onClick={()=>{setSelected(dk);setView("day");}} style={{padding:"6px 2px 4px",textAlign:"center",cursor:"pointer",borderLeft:B,background:isSel?"#EEEDFE18":"none"}}>
                  <p style={{fontSize:10,color:"#bbb",textTransform:"uppercase",letterSpacing:"0.05em"}}>{short}</p>
                  <div style={{width:26,height:26,borderRadius:"50%",background:isToday?"#7F77DD":"none",display:"flex",alignItems:"center",justifyContent:"center",margin:"2px auto 1px"}}>
                    <p style={{fontSize:14,fontWeight:500,color:isToday?"#fff":"#1a1a1a"}}>{num}</p>
                  </div>
                  {/* Google event dot indicators */}
                  {dayGcal.length>0&&<div style={{display:"flex",justifyContent:"center",gap:2,marginTop:2}}>
                    {dayGcal.slice(0,3).map((_,i)=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:GCAL_COLOR}}/>)}
                  </div>}
                </div>
              );
            })}
          </div>

          {/* Grid */}
          <div style={{position:"relative",minWidth:520,maxHeight:500,overflowY:"auto"}}>
            {HOURS.map(h=>(
              <div key={h} style={{display:"grid",gridTemplateColumns:"40px repeat(7,1fr)",height:HOUR_H}}>
                <div style={{fontSize:10,color:"#ccc",padding:"2px 4px 0",textAlign:"right",borderTop:G,boxSizing:"border-box"}}>{String(h).padStart(2,"0")}:00</div>
                {weekDays.map(dk=>(
                  <div key={dk} onClick={()=>{setSelected(dk);setView("day");}} style={{borderTop:G,borderLeft:G,boxSizing:"border-box",position:"relative",background:dk===selected?"#EEEDFE08":"none",cursor:"pointer"}}>
                    <div style={{position:"absolute",top:"50%",left:0,right:0,borderTop:GD}}/>
                  </div>
                ))}
              </div>
            ))}

            {/* Planner blocks */}
            {weekDays.map((dk,di)=>{
              const eff=getEffectiveTasks(dk).filter(t=>!t._cancelled);
              const sched=schedule(eff,dayData(dk).dayStart||"08:00");
              const colW=`calc((100% - 40px)/7)`;
              return sched.map(t=>{
                const top=minsToY(t._s),height=Math.max((t.duration/60)*HOUR_H,14);
                const tc=TYPE_COLORS[primaryType(t)]||"#888";
                if(top<0||top>HOURS.length*HOUR_H) return null;
                return (
                  <div key={t.id} onClick={()=>{setSelected(dk);setView("day");}} style={{position:"absolute",top,left:`calc(40px + ${di}*${colW} + 2px)`,width:`calc(${colW}*0.56)`,height:height-2,background:tc+"28",borderLeft:`2px solid ${tc}`,borderRadius:3,overflow:"hidden",padding:"1px 3px",cursor:"pointer"}}>
                    <p style={{fontSize:9,fontWeight:500,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3,opacity:t.done?0.4:1}}>{t.name}</p>
                  </div>
                );
              });
            })}

            {/* Google Calendar blocks in week view */}
            {weekDays.map((dk,di)=>{
              const dayEvs=gcalEvents.filter(e=>e.dk===dk);
              const colW=`calc((100% - 40px)/7)`;
              return dayEvs.map(ev=>{
                const top=minsToY(ev.startMins),height=Math.max((ev.duration/60)*HOUR_H,14);
                if(top<0) return null;
                return (
                  <div key={ev.id} style={{position:"absolute",top,left:`calc(40px + ${di}*${colW} + calc(${colW}*0.58))`,width:`calc(${colW}*0.38)`,height:height-2,background:"#f0f0f0",borderLeft:`2px solid ${GCAL_COLOR}`,borderRadius:3,overflow:"hidden",padding:"1px 3px",pointerEvents:"none"}}>
                    <p style={{fontSize:9,color:"#888",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3}}>{ev.name}</p>
                  </div>
                );
              });
            })}
          </div>

          {/* Legend */}
          <div style={{padding:"8px 14px",borderTop:B,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            {TYPES.map(ty=>(
              <span key={ty} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#666"}}>
                <span style={{width:9,height:9,borderRadius:2,background:TYPE_COLORS[ty],display:"inline-block"}}/>{ty}
              </span>
            ))}
            <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#666"}}>
              <span style={{width:9,height:9,borderRadius:2,border:"1px dashed #aaa",display:"inline-block"}}/>recurring
            </span>
            {gcalConnected&&<span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#666"}}>
              <span style={{width:9,height:9,borderRadius:2,background:GCAL_COLOR,display:"inline-block"}}/>Google Calendar
            </span>}
          </div>
        </div>
      ) : (
        /* DAY VIEW */
        <div style={{display:"grid",gridTemplateColumns:"220px 1fr",minHeight:"calc(100vh - 56px)"}}>

          {/* LEFT PANEL */}
          <div style={{borderRight:B,display:"flex",flexDirection:"column",maxHeight:"calc(100vh - 56px)"}}>
            {/* Mini day picker */}
            <div style={{display:"flex",padding:"8px 8px 6px",borderBottom:B,gap:2,flexShrink:0}}>
              {weekDays.map(dk=>{
                const {short,num}=fmtDay(dk),isToday=dk===today,isSel=dk===selected;
                return (
                  <div key={dk} onClick={()=>setSelected(dk)} style={{flex:1,textAlign:"center",cursor:"pointer"}}>
                    <p style={{fontSize:9,color:"#bbb",textTransform:"uppercase"}}>{short}</p>
                    <div style={{width:20,height:20,borderRadius:"50%",background:isToday?"#7F77DD":isSel?"#EEEDFE":"none",border:isSel&&!isToday?"1.5px solid #7F77DD":"none",display:"flex",alignItems:"center",justifyContent:"center",margin:"1px auto"}}>
                      <p style={{fontSize:11,fontWeight:500,color:isToday?"#fff":isSel?"#3C3489":"#555"}}>{num}</p>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Energy + start */}
            <div style={{padding:"8px 10px",borderBottom:B,display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
              <div>
                <p style={{fontSize:10,color:"#bbb",marginBottom:3}}>Start</p>
                <input type="time" value={selData.dayStart||"08:00"} onChange={e=>setDayData(selected,{...selData,dayStart:e.target.value})} style={{fontSize:12,padding:"2px 4px"}}/>
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:10,color:"#bbb",marginBottom:3}}>Energy</p>
                <div style={{display:"flex",gap:3}}>
                  {[1,2,3,4,5].map(n=>(
                    <div key={n} onClick={()=>setDayData(selected,{...selData,energy:n})} style={{width:16,height:16,borderRadius:"50%",background:(selData.energy||3)>=n?"#7F77DD":"#f0f0f0",cursor:"pointer",border:"1px solid #e0e0e0"}}/>
                  ))}
                </div>
              </div>
            </div>

            {/* Warnings */}
            {selWarnings.length>0&&(
              <div style={{padding:"6px 10px",borderBottom:B,flexShrink:0}}>
                {selWarnings.map((w,i)=>(
                  <div key={i} style={{fontSize:11,padding:"4px 6px",borderRadius:6,border:`1px solid ${w.c}44`,color:"#555",marginBottom:4,background:w.c+"0a"}}>{w.msg}</div>
                ))}
              </div>
            )}

            {/* Google events for day */}
            {gcalConnected&&selGcal.length>0&&(
              <div style={{padding:"6px 10px",borderBottom:B,flexShrink:0}}>
                <p style={{fontSize:10,color:"#bbb",marginBottom:4}}>Google Calendar</p>
                {selGcal.map(ev=>(
                  <div key={ev.id} style={{display:"flex",gap:6,alignItems:"center",padding:"3px 0"}}>
                    <div style={{width:8,height:8,borderRadius:2,background:GCAL_COLOR,flexShrink:0}}/>
                    <span style={{fontSize:12,color:"#666"}}>{ev.name}</span>
                    <span style={{fontSize:10,color:"#bbb",marginLeft:"auto"}}>{minsToTime(ev.startMins)}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Task list */}
            <div style={{flex:1,overflowY:"auto",padding:"6px 8px"}}>
              {selSched.length===0&&<p style={{fontSize:12,color:"#bbb",textAlign:"center",marginTop:20}}>No tasks — add one below</p>}
              {selSched.map(task=>{
                const isExp=expandedId===task.id;
                const pt=primaryType(task);
                const tc=TYPE_COLORS[pt]||"#888";
                const doneTodos=(task.todos||[]).filter(td=>td.done).length,totalTodos=(task.todos||[]).length;
                const taskTypes=task.types||[task.type||"task"];
                function updateTaskField(field,val){
                  if(task._recurring){
                    const dd=dayData(selected),ex=dd.tasks.find(t=>t.repeatId===task.repeatId);
                    if(ex) updateTasks(selected,dd.tasks.map(t=>t.repeatId===task.repeatId?{...t,[field]:val}:t));
                    else updateTasks(selected,[...dd.tasks,{...task,id:Date.now(),[field]:val}]);
                  } else { updateTasks(selected,dayData(selected).tasks.map(t=>t.id===task.id?{...t,[field]:val}:t)); }
                }
                function toggleType(ty){
                  const cur=taskTypes;
                  const next=cur.includes(ty)?cur.filter(x=>x!==ty):[...cur,ty];
                  if(next.length===0) return;
                  updateTaskField("types",next);
                }
                return (
                  <div key={task.id} style={{borderRadius:6,border:task._recurring?`1px dashed ${tc}66`:G,marginBottom:5,background:"#fff",opacity:task.done?0.55:1,overflow:"hidden"}}>
                    <div style={{display:"flex",gap:7,padding:"7px 8px",alignItems:"flex-start"}}>
                      <div onClick={()=>toggleDone(selected,task)} style={{width:9,height:9,borderRadius:"50%",background:tc,flexShrink:0,marginTop:4,cursor:"pointer"}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>

                      <button title={task._recurring?"Remove from today":"Delete task"} onClick={()=>removeTask(selected,task.id,task._recurring,task.repeatId)} style={{fontSize:13,color:"#ccc",background:"none",border:"none",padding:"0 2px",flexShrink:0}}>×</button>                    </div>
                    {isExp&&(
                      <div style={{padding:"0 8px 8px",borderTop:"1px solid #f5f5f5"}}>
                        {/* Editable name */}

                        <p style={{fontSize:10,color:"#bbb",margin:"6px 0 3px"}}>Types (select multiple)</p>
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>

                            const ttyc=TYPE_COLORS[ty]||"#888";
                            const sel=taskTypes.includes(ty);
                            return <button key={ty} onClick={()=>toggleType(ty)} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:sel?`1.5px solid ${ttyc}`:"1px solid #e0e0e0",background:sel?ttyc+"22":"none",color:sel?ttyc:"#999"}}>{ty}</button>;
                          })}
                        </div>
                        {/* Fixed time toggle */}
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <label style={{fontSize:10,color:"#bbb"}}>Fixed start time (won't be moved by scheduler)</label>
                          <div onClick={()=>updateTaskField("fixed",!task.fixed)} style={{width:32,height:18,borderRadius:99,background:task.fixed?"#1D9E75":"#e0e0e0",cursor:"pointer",position:"relative",flexShrink:0}}>
                            <div style={{position:"absolute",top:2,left:task.fixed?14:2,width:14,height:14,borderRadius:"50%",background:"#fff"}}/>
                          </div>
                        </div>
                        {/* Time + duration */}
                        <div style={{display:"flex",gap:8,marginBottom:6}}>
                          <div style={{flex:1}}>
                            <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Start</label>
                            <input type="time" value={task.startTime||""} onChange={e=>updateTaskField("startTime",e.target.value)} style={{fontSize:12,width:"100%"}}/>
                          </div>
                          <div style={{flex:1}}>
                            <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Mins</label>
                            <input type="number" min={15} step={15} value={task.duration} onChange={e=>updateTaskField("duration",Number(e.target.value))} style={{fontSize:12,width:"100%"}}/>
                          </div>
                        </div>
                        {/* Notes + todos (only for non-break/meal or if they want them) */}
                        <p style={{fontSize:10,color:"#bbb",margin:"4px 0 3px"}}>Notes (each line → todo)</p>
                        <textarea rows={3} placeholder="Add notes…" value={task.note||""} onChange={e=>updateNote(selected,task,e.target.value)} style={{width:"100%",fontSize:12,resize:"vertical",padding:"4px 6px"}}/>
                        {(task.todos||[]).length>0&&(
                          <div style={{marginTop:6}}>
                            {(task.todos||[]).map(td=>{
                              const tagColor=td.tag?TODO_TAG_COLORS[td.tag]||"#888":null;
                              const isTagOpen=tagPickerOpen===`${task.id}-${td.id}`;
                              return (
                                <div key={td.id} style={{marginBottom:4}}>
                                  <div style={{display:"flex",gap:6,alignItems:"flex-start",padding:"3px 0"}}>
                                    <div onClick={()=>toggleTodo(selected,task,td.id)} style={{width:13,height:13,borderRadius:3,border:`1.5px solid ${tc}`,background:td.done?tc:"none",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                                      {td.done&&<span style={{fontSize:9,color:"#fff",lineHeight:1}}>✓</span>}
                                    </div>
                                    <span style={{fontSize:12,textDecoration:td.done?"line-through":"none",lineHeight:1.4,color:td.done?"#bbb":"#1a1a1a",flex:1}}>{td.text}</span>
                                    {td.tag&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:tagColor+"22",color:tagColor,flexShrink:0,cursor:"pointer"}} onClick={()=>setTagPickerOpen(isTagOpen?null:`${task.id}-${td.id}`)}>{td.tag}</span>}
                                    <button onClick={()=>setTagPickerOpen(isTagOpen?null:`${task.id}-${td.id}`)} style={{fontSize:10,color:"#ccc",background:"none",border:"1px solid #e0e0e0",borderRadius:4,padding:"0 4px",lineHeight:"16px",flexShrink:0}}>{td.tag?"…":"tag"}</button>
                                  </div>
                                  {isTagOpen&&(
                                    <div style={{display:"flex",flexWrap:"wrap",gap:3,paddingLeft:19,marginBottom:2}}>
                                      {TODO_TAGS.map(tg=>{
                                        const tgc=TODO_TAG_COLORS[tg];
                                        return <button key={tg} onClick={()=>{setTodoTag(selected,task,td.id,tg);setTagPickerOpen(null);}} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:td.tag===tg?`1.5px solid ${tgc}`:"1px solid #e0e0e0",background:td.tag===tg?tgc+"22":"none",color:td.tag===tg?tgc:"#999"}}>{tg}</button>;
                                      })}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                        <div style={{display:"flex",gap:4,marginTop:5}}>
                          <input placeholder="Add todo…" value={todoInput[task.id]||""} onChange={e=>setTodoInput(p=>({...p,[task.id]:e.target.value}))}
                            onKeyDown={e=>{if(e.key==="Enter"){addTodoItem(selected,task,todoInput[task.id]||"");setTodoInput(p=>({...p,[task.id]:""}));}}}
                            style={{flex:1,fontSize:12,padding:"3px 6px"}}/>
                          <button onClick={()=>{addTodoItem(selected,task,todoInput[task.id]||"");setTodoInput(p=>({...p,[task.id]:""}));}} style={{fontSize:12,padding:"3px 8px",background:"#EEEDFE",color:"#3C3489",border:"none",borderRadius:6}}>+</button>
                        </div>
                        {/* Delete options */}
                        <div style={{display:"flex",gap:6,marginTop:10,paddingTop:8,borderTop:"1px solid #f5f5f5"}}>

                            <>
                              <button onClick={()=>removeTask(selected,task.id,true,task.repeatId)} style={{flex:1,padding:"5px",fontSize:11,background:"#FAEEDA",color:"#633806",border:"none",borderRadius:6}}>Remove today only</button>

                            </>
                          ):(
                            <button onClick={()=>removeTask(selected,task.id,false,null)} style={{flex:1,padding:"5px",fontSize:11,background:"#FCEBEB",color:"#A32D2D",border:"none",borderRadius:6}}>Delete task</button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );

            </div>

            {/* Add area */}
            <div style={{padding:"8px",borderTop:B,flexShrink:0}}>
              {showAdd?(
                <div style={{background:"#fafafa",borderRadius:8,padding:"10px",border:B}}>
                  <input placeholder="Task name" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} style={{width:"100%",fontSize:13,marginBottom:7}}/>
                  <div style={{display:"flex",gap:6,marginBottom:7}}>
                    <div style={{flex:1}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Start</label><input type="time" value={draft.startTime||""} onChange={e=>setDraft(d=>({...d,startTime:e.target.value}))} style={{fontSize:12,width:"100%"}}/></div>
                    <div style={{flex:1}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Mins</label><input type="number" min={15} step={15} value={draft.duration} onChange={e=>setDraft(d=>({...d,duration:Number(e.target.value)}))} style={{fontSize:12,width:"100%"}}/></div>
                  </div>
                  <div style={{marginBottom:6}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Types (select multiple)</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{TYPES.map(ty=>(<button key={ty} onClick={()=>setDraft(d=>({...d,types:d.types.includes(ty)?d.types.filter(x=>x!==ty).length>0?d.types.filter(x=>x!==ty):d.types:[...d.types,ty]}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:(draft.types||[]).includes(ty)?`1.5px solid ${TYPE_COLORS[ty]}`:"1px solid #e0e0e0",background:(draft.types||[]).includes(ty)?TYPE_COLORS[ty]+"22":"none",color:(draft.types||[]).includes(ty)?TYPE_COLORS[ty]:"#999"}}>{ty}</button>))}</div>
                  </div>
                  <div style={{marginBottom:6}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Repeat</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{REPEAT_OPTIONS.map(r=>(<button key={r} onClick={()=>setDraft(d=>({...d,repeat:r}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:draft.repeat===r?"1.5px solid #D85A30":"1px solid #e0e0e0",background:draft.repeat===r?"#FAECE7":"none",color:draft.repeat===r?"#D85A30":"#999"}}>{r}</button>))}</div>
                    {draft.repeat==="custom"&&<div style={{display:"flex",gap:3,marginTop:5,flexWrap:"wrap"}}>{DOW.map((day,i)=>(<button key={i} onClick={()=>setDraft(d=>({...d,repeatDays:d.repeatDays.includes(i)?d.repeatDays.filter(x=>x!==i):[...d.repeatDays,i]}))} style={{fontSize:10,padding:"2px 6px",borderRadius:99,border:(draft.repeatDays||[]).includes(i)?"1.5px solid #D85A30":"1px solid #e0e0e0",background:(draft.repeatDays||[]).includes(i)?"#FAECE7":"none",color:(draft.repeatDays||[]).includes(i)?"#D85A30":"#999"}}>{day}</button>))}</div>}
                    {draft.repeat!=="none"&&(
                      <div style={{display:"flex",gap:6,marginTop:6}}>
                        <div style={{flex:1}}>
                          <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Start date</label>
                          <input type="date" value={draft.repeatStart||""} onChange={e=>setDraft(d=>({...d,repeatStart:e.target.value}))} style={{fontSize:11,width:"100%"}}/>
                        </div>
                        <div style={{flex:1}}>
                          <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>End date (optional)</label>
                          <input type="date" value={draft.repeatEnd||""} onChange={e=>setDraft(d=>({...d,repeatEnd:e.target.value}))} style={{fontSize:11,width:"100%"}}/>
                        </div>
                      </div>
                    )}
                  </div>
                  <div style={{marginBottom:7}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Priority</label>
                    <div style={{display:"flex",gap:3}}>{["low","medium","high"].map(p=>(<button key={p} onClick={()=>setDraft(d=>({...d,priority:p}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:draft.priority===p?`1.5px solid ${PRIORITY_COLORS[p]}`:"1px solid #e0e0e0",background:"none",color:draft.priority===p?PRIORITY_COLORS[p]:"#999"}}>{p}</button>))}</div>
                  </div>
                  <div style={{marginBottom:7}}><label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:3}}>Reminder</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{REMINDER_OPTIONS.map(r=>(<button key={r} onClick={()=>setDraft(d=>({...d,reminder:r}))} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:draft.reminder===r?"1.5px solid #7F77DD":"1px solid #e0e0e0",background:draft.reminder===r?"#EEEDFE":"none",color:draft.reminder===r?"#3C3489":"#999"}}>{r}</button>))}</div>
                    {!notifGranted&&draft.reminder!=="none"&&<p style={{fontSize:10,color:"#BA7517",marginTop:4}}>Enable reminders in the header to receive notifications.</p>}
                  </div>
                  <textarea placeholder="Notes (each line → todo)" value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} rows={2} style={{width:"100%",fontSize:12,resize:"none",padding:"4px 6px",marginBottom:7}}/>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={addTask} style={{flex:1,padding:"6px",fontSize:12,background:"#EEEDFE",color:"#3C3489",border:"none",borderRadius:6,fontWeight:500}}>Add</button>
                    <button onClick={()=>setShowAdd(false)} style={{padding:"6px 10px",fontSize:12,background:"none",border:B,borderRadius:6,color:"#888"}}>Cancel</button>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>setShowAdd(true)} style={{flex:1,padding:"6px",fontSize:12,fontWeight:500,background:"#EEEDFE",color:"#3C3489",border:"none",borderRadius:6}}>+ Task</button>
                  <button onClick={()=>{
                    const now=new Date(); const st=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
                    updateTasks(selected,[...dayData(selected).tasks,{id:Date.now(),name:"Break",duration:15,priority:"low",types:["break"],done:false,note:"",todos:[],startTime:st,repeat:"none",repeatId:null}]);
                  }} style={{padding:"6px 8px",fontSize:12,background:"none",border:B,borderRadius:6,color:"#888"}}>Break</button>
                  <button onClick={()=>{
                    const now=new Date(); const st=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
                    updateTasks(selected,[...dayData(selected).tasks,{id:Date.now(),name:"Meal",duration:30,priority:"low",types:["meal"],done:false,note:"",todos:[],startTime:st,repeat:"none",repeatId:null}]);
                  }} style={{padding:"6px 8px",fontSize:12,background:"none",border:B,borderRadius:6,color:"#888"}}>Meal</button>
                </div>
              )}
            </div>
          </div>

          {/* RIGHT: TIMELINE */}
          <div style={{position:"relative",overflowY:"auto",maxHeight:"calc(100vh - 56px)"}} ref={timelineRef}>
            {HOURS.map(h=>(
              <div key={h} style={{display:"flex",height:HOUR_H,borderTop:G,boxSizing:"border-box",position:"relative"}}>
                <div style={{width:44,flexShrink:0,fontSize:10,color:"#ccc",padding:"3px 6px 0",textAlign:"right"}}>{String(h).padStart(2,"0")}:00</div>
                <div style={{flex:1,borderLeft:G,position:"relative"}}>
                  <div style={{position:"absolute",top:"50%",left:0,right:0,borderTop:GD}}/>
                </div>
              </div>
            ))}

            {/* Google Calendar blocks */}
            {selGcal.map(ev=>{
              const top=minsToY(ev.startMins),height=Math.max((ev.duration/60)*HOUR_H,20);
              if(top<0) return null;
              return (
                <div key={ev.id} style={{position:"absolute",top,left:46,right:6,height:height-2,background:"#f5f5f5",borderLeft:`3px solid ${GCAL_COLOR}`,borderRadius:6,boxSizing:"border-box",padding:"3px 8px",border:`1px solid #e8e8e8`,borderLeftWidth:3,pointerEvents:"none",opacity:0.85}}>
                  <p style={{fontSize:11,fontWeight:500,color:"#888",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3}}>{ev.name}</p>
                  {height>28&&<p style={{fontSize:10,color:"#bbb",marginTop:1}}>{minsToTime(ev.startMins)}–{minsToTime(ev.startMins+ev.duration)}</p>}
                </div>
              );
            })}

            {/* Planner task blocks */}
            {selSched.map(task=>{
              const top=minsToY(task._s),height=Math.max((task.duration/60)*HOUR_H,20);
              const pt=primaryType(task);
              const tc=TYPE_COLORS[pt]||"#888",isExp=expandedId===task.id;
              const taskTypes=task.types||[task.type||"task"];
              if(top<0) return null;
              return (
                <div key={task.id} onMouseDown={e=>onBlockMouseDown(e,task)} onClick={()=>setExpandedId(isExp?null:task.id)}
                  style={{position:"absolute",top,left:46,right:6,height:height-2,background:tc+(task.done?"15":task._recurring?"33":"28"),borderLeft:`3px solid ${tc}`,borderRadius:6,boxSizing:"border-box",padding:"3px 8px 4px",cursor:"grab",userSelect:"none",overflow:"hidden",border:`${task._recurring?"1px dashed":"1px solid"} ${tc}55`,borderLeftWidth:3}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <p style={{fontSize:11,fontWeight:500,color:"#1a1a1a",opacity:task.done?0.4:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3}}>{task.name}</p>
                    <div style={{display:"flex",gap:3,flexShrink:0,marginLeft:4}}>
                      {task._recurring&&<span style={{fontSize:9,padding:"0 4px",borderRadius:99,background:"#FAECE7",color:"#D85A30"}}>↻</span>}
                      <span style={{fontSize:9,padding:"0 4px",borderRadius:99,background:tc+"33",color:tc}}>{task.type}</span>
                    </div>
                  </div>
                  {height>28&&<p style={{fontSize:10,color:"#666",marginTop:1}}>{minsToTime(task._s)}–{minsToTime(task._e)}</p>}
                  {height>44&&taskTypes.length>1&&<div style={{display:"flex",gap:2,marginTop:1,flexWrap:"wrap"}}>{taskTypes.slice(1).map(ty=><span key={ty} style={{fontSize:8,padding:"0 4px",borderRadius:99,background:(TYPE_COLORS[ty]||"#888")+"33",color:TYPE_COLORS[ty]||"#888"}}>{ty}</span>)}</div>}
                  {height>44&&task.todos&&task.todos.length>0&&<p style={{fontSize:10,color:"#bbb",marginTop:1}}>{task.todos.filter(t=>t.done).length}/{task.todos.length} todos</p>}
                  <div onMouseDown={e=>onResizeMouseDown(e,task)} onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,height:8,cursor:"ns-resize",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{width:24,height:2,borderRadius:1,background:tc+"88"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* COPY DAY PANEL */}
      {showCopyDay&&(
        <div style={{position:"fixed",inset:0,background:"#00000033",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:12,padding:"24px",maxWidth:340,width:"100%",border:B}}>
            <p style={{fontSize:15,fontWeight:500,marginBottom:6}}>Copy day</p>
            <p style={{fontSize:12,color:"#888",marginBottom:16}}>Copy all tasks from <strong>{fmtDay(selected).short} {fmtDay(selected).num} {fmtDay(selected).month}</strong> to another day.</p>
            <label style={{fontSize:11,color:"#bbb",display:"block",marginBottom:4}}>Copy to date</label>
            <input type="date" value={copyTarget} onChange={e=>setCopyTarget(e.target.value)} style={{width:"100%",fontSize:13,marginBottom:16}}/>
            <p style={{fontSize:11,color:"#bbb",marginBottom:16}}>Existing tasks on the target day will be kept — copied tasks are added on top.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setShowCopyDay(false);setCopyTarget("");}} style={{flex:1,padding:"8px",fontSize:13,background:"none",border:B,borderRadius:6,color:"#666"}}>Cancel</button>
              <button onClick={()=>copyDayTo(selected,copyTarget)} disabled={!copyTarget} style={{flex:1,padding:"8px",fontSize:13,fontWeight:500,background:"#E6F1FB",color:"#185FA5",border:"none",borderRadius:6,opacity:copyTarget?1:0.4}}>Copy tasks</button>
            </div>
          </div>
        </div>
      )}

      {/* TIMETABLE BUILDER */}
      {showTimetable&&(
        <div style={{position:"fixed",inset:0,background:"#00000033",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
          <div style={{background:"#fff",borderRadius:12,padding:"20px",maxWidth:600,width:"100%",border:B,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <p style={{fontSize:15,fontWeight:500}}>Teaching timetable</p>
              <button onClick={()=>setShowTimetable(false)} style={{fontSize:18,color:"#bbb",background:"none",border:"none"}}>×</button>
            </div>
            <p style={{fontSize:12,color:"#888",marginBottom:16}}>Add your recurring weekly slots. Each will be saved as a recurring event.</p>
            {timetableSlots.map(({day,slots},dayIdx)=>(
              <div key={day} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <p style={{fontSize:12,fontWeight:500,color:"#1a1a1a"}}>{day}</p>
                  <button onClick={()=>addTimetableSlot(dayIdx)} style={{fontSize:11,padding:"2px 8px",borderRadius:6,border:"1px solid #1D9E75",background:"#E1F5EE",color:"#0F6E56"}}>+ Add slot</button>
                </div>
                {slots.length===0&&<p style={{fontSize:11,color:"#ccc",marginBottom:4}}>No slots — click Add slot</p>}
                {slots.map((slot,slotIdx)=>(
                  <div key={slotIdx} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:8,padding:"8px",background:"#fafafa",borderRadius:6,border:G,flexWrap:"wrap"}}>
                    <div style={{flex:"2 1 120px"}}>
                      <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Name</label>
                      <input value={slot.name} onChange={e=>updateTimetableSlot(dayIdx,slotIdx,"name",e.target.value)} placeholder="e.g. Lecture" style={{width:"100%",fontSize:12}}/>
                    </div>
                    <div style={{flex:"1 1 80px"}}>
                      <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Start</label>
                      <input type="time" value={slot.startTime} onChange={e=>updateTimetableSlot(dayIdx,slotIdx,"startTime",e.target.value)} style={{width:"100%",fontSize:12}}/>
                    </div>
                    <div style={{flex:"1 1 60px"}}>
                      <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Mins</label>
                      <input type="number" min={15} step={15} value={slot.duration} onChange={e=>updateTimetableSlot(dayIdx,slotIdx,"duration",e.target.value)} style={{width:"100%",fontSize:12}}/>
                    </div>
                    <div style={{flex:"1 1 80px"}}>
                      <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>Type</label>
                      <select value={slot.type} onChange={e=>updateTimetableSlot(dayIdx,slotIdx,"type",e.target.value)} style={{width:"100%",fontSize:12,padding:"3px 4px"}}>
                        {TYPES.map(ty=><option key={ty} value={ty}>{ty}</option>)}
                      </select>
                    </div>
                    <div style={{flex:"1 1 100px"}}>
                      <label style={{fontSize:10,color:"#bbb",display:"block",marginBottom:2}}>End date</label>
                      <input type="date" value={slot.endDate} onChange={e=>updateTimetableSlot(dayIdx,slotIdx,"endDate",e.target.value)} style={{width:"100%",fontSize:11}}/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2}}>
                      <label style={{fontSize:10,color:"#bbb"}}>Fixed time</label>
                      <div onClick={()=>updateTimetableSlot(dayIdx,slotIdx,"fixed",!slot.fixed)} style={{width:32,height:18,borderRadius:99,background:slot.fixed!==false?"#1D9E75":"#e0e0e0",cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                        <div style={{position:"absolute",top:2,left:slot.fixed!==false?14:2,width:14,height:14,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
                      </div>
                    </div>
                    <button onClick={()=>removeTimetableSlot(dayIdx,slotIdx)} style={{fontSize:14,color:"#ccc",background:"none",border:"none",alignSelf:"flex-end",padding:"4px"}}>×</button>
                  </div>
                ))}
              </div>
            ))}
            <div style={{borderTop:B,paddingTop:14,marginTop:4}}>
              <label style={{fontSize:11,color:"#bbb",display:"block",marginBottom:4}}>Apply from week starting</label>
              <input type="date" defaultValue={weekDays[0]} id="timetable-start" style={{fontSize:12,marginBottom:14}}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowTimetable(false)} style={{flex:1,padding:"8px",fontSize:13,background:"none",border:B,borderRadius:6,color:"#666"}}>Cancel</button>
                <button onClick={()=>applyTimetable(document.getElementById("timetable-start").value||weekDays[0])} style={{flex:1,padding:"8px",fontSize:13,fontWeight:500,background:"#E1F5EE",color:"#0F6E56",border:"none",borderRadius:6}}>Save timetable</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CLEAR DAY CONFIRMATION */}
      {showClearDay&&(
        <div style={{position:"fixed",inset:0,background:"#00000033",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:12,padding:"24px",maxWidth:320,width:"100%",border:B,boxShadow:"0 4px 24px #00000018"}}>
            <p style={{fontSize:15,fontWeight:500,marginBottom:8,color:"#1a1a1a"}}>Clear {fmtDay(selected).short} {fmtDay(selected).num} {fmtDay(selected).month}?</p>
            <p style={{fontSize:13,color:"#888",marginBottom:20,lineHeight:1.5}}>This will remove all tasks from this day. Recurring tasks will still appear unless individually removed. This cannot be undone.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowClearDay(false)} style={{flex:1,padding:"8px",fontSize:13,background:"none",border:B,borderRadius:6,color:"#666"}}>Cancel</button>
              <button onClick={clearDay} style={{flex:1,padding:"8px",fontSize:13,fontWeight:500,background:"#A32D2D",color:"#fff",border:"none",borderRadius:6}}>Clear this day</button>
            </div>
          </div>
        </div>
      )}

      {/* CLEAR DIARY CONFIRMATION */}
      {showClearConfirm&&(
        <div style={{position:"fixed",inset:0,background:"#00000033",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:12,padding:"24px",maxWidth:320,width:"100%",border:B,boxShadow:"0 4px 24px #00000018"}}>
            <p style={{fontSize:15,fontWeight:500,marginBottom:8,color:"#1a1a1a"}}>Clear entire diary?</p>
            <p style={{fontSize:13,color:"#888",marginBottom:20,lineHeight:1.5}}>This will permanently delete all tasks, recurring events, and notes across all days. This cannot be undone.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowClearConfirm(false)} style={{flex:1,padding:"8px",fontSize:13,background:"none",border:B,borderRadius:6,color:"#666"}}>Cancel</button>
              <button onClick={clearAll} style={{flex:1,padding:"8px",fontSize:13,fontWeight:500,background:"#A32D2D",color:"#fff",border:"none",borderRadius:6}}>Yes, clear everything</button>
            </div>
          </div>
        </div>
      )}

      {/* SLIDE-OUT TO-DO PANEL */}
      {showTodoPanel&&(
        <div style={{position:"fixed",top:0,right:0,bottom:0,width:320,background:"#fff",borderLeft:B,boxShadow:"-4px 0 20px #0000001a",zIndex:100,display:"flex",flexDirection:"column",overflowY:"auto"}}>
          <div style={{padding:"12px 14px",borderBottom:B,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <p style={{fontSize:14,fontWeight:500}}>To-do list</p>
            <button onClick={()=>setShowTodoPanel(false)} style={{fontSize:18,color:"#bbb",background:"none",border:"none",lineHeight:1}}>×</button>
          </div>
          {/* Filter */}
          <div style={{padding:"8px 14px",borderBottom:B,flexShrink:0}}>
            <div style={{display:"flex",gap:4,marginBottom:6}}>
              {["all","today","pending","done"].map(f=>(
                <button key={f} onClick={()=>setTodoFilter(f)} style={{fontSize:11,padding:"3px 9px",borderRadius:99,border:todoFilter===f?"1.5px solid #7F77DD":B,background:todoFilter===f?"#EEEDFE":"none",color:todoFilter===f?"#3C3489":"#888"}}>{f}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {TODO_TAGS.map(tg=>{
                const tgc=TODO_TAG_COLORS[tg];
                return <button key={tg} onClick={()=>setTodoTagFilter(todoTagFilter===tg?null:tg)} style={{fontSize:10,padding:"2px 7px",borderRadius:99,border:todoTagFilter===tg?`1.5px solid ${tgc}`:"1px solid #e0e0e0",background:todoTagFilter===tg?tgc+"22":"none",color:todoTagFilter===tg?tgc:"#bbb"}}>{tg}</button>;
              })}
            </div>
          </div>
          {/* Grouped by day */}
          <div style={{flex:1,overflowY:"auto",padding:"8px 14px"}}>
            {(()=>{
              const today=todayKey();
              const relevantDays=todoFilter==="today"?[today]:
                todoFilter==="all"?[...new Set([...Object.keys(allData),today])].sort():
                [...new Set([...Object.keys(allData),today])].sort();
              return relevantDays.map(dk=>{
                const eff=getEffectiveTasks(dk).filter(t=>!t._cancelled);
                const allTodos=eff.flatMap(task=>(task.todos||[]).map(td=>({...td,taskName:task.name,taskType:task.type,taskId:task.id,task})));
                const filtered=allTodos
                  .filter(td=>todoFilter==="done"?td.done:todoFilter==="pending"?!td.done:true)
                  .filter(td=>todoTagFilter?td.tag===todoTagFilter:true);
                if(filtered.length===0) return null;
                const {short,num,month}=fmtDay(dk);
                const isToday=dk===today;
                return (
                  <div key={dk} style={{marginBottom:16}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:isToday?"#7F77DD":"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:11,fontWeight:500,color:isToday?"#fff":"#888"}}>{num}</span>
                      </div>
                      <span style={{fontSize:12,fontWeight:500,color:isToday?"#7F77DD":"#1a1a1a"}}>{isToday?"Today":`${short} ${num} ${month}`}</span>
                      <span style={{fontSize:11,color:"#bbb",marginLeft:"auto"}}>{filtered.filter(t=>t.done).length}/{filtered.length} done</span>
                    </div>
                    {filtered.map((td,i)=>{
                      const tc=TYPE_COLORS[td.taskType]||"#888";
                      const tagColor=td.tag?TODO_TAG_COLORS[td.tag]||"#888":null;
                      return (
                        <div key={i} onClick={()=>toggleTodo(dk,td.task,td.id)} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"5px 6px",borderRadius:6,marginBottom:3,cursor:"pointer",background:td.done?"#fafafa":"#fff",border:td.done?"1px solid #f0f0f0":G}}>
                          <div style={{width:14,height:14,borderRadius:3,border:`1.5px solid ${tc}`,background:td.done?tc:"none",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {td.done&&<span style={{fontSize:9,color:"#fff",lineHeight:1}}>✓</span>}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <p style={{fontSize:12,textDecoration:td.done?"line-through":"none",color:td.done?"#bbb":"#1a1a1a",lineHeight:1.3}}>{td.text}</p>
                            <div style={{display:"flex",gap:4,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
                              <p style={{fontSize:10,color:"#bbb"}}>{td.taskName} · <span style={{color:tc}}>{td.taskType}</span></p>
                              {td.tag&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:tagColor+"22",color:tagColor}}>{td.tag}</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              }).filter(Boolean);
            })()}
          </div>
          {/* Summary */}
          <div style={{padding:"10px 14px",borderTop:B,flexShrink:0,background:"#fafafa"}}>
            {(()=>{
              const allTodos=Object.keys(allData).flatMap(dk=>getEffectiveTasks(dk).filter(t=>!t._cancelled).flatMap(t=>t.todos||[]));
              const done=allTodos.filter(t=>t.done).length;
              return <p style={{fontSize:12,color:"#888"}}>{done} of {allTodos.length} todos complete across all days</p>;
            })()}
          </div>
        </div>
      )}
      {showTodoPanel&&<div onClick={()=>setShowTodoPanel(false)} style={{position:"fixed",inset:0,background:"#00000018",zIndex:99}}/>}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function Root(){
  const [session,setSession]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:14,color:"#bbb"}}>Loading…</div>;
  if(!session) return <LoginScreen/>;
  return <Planner user={session.user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
